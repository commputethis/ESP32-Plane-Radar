# Tag a release (v1.0.0) to attach firmware to GitHub Releases.
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [supermini, waveshare-s3, waveshare-s3-touch]
        include:
          - environment: supermini
            suffix: esp32c3-supermini
          - environment: waveshare-s3
            suffix: waveshare-s3
          - environment: waveshare-s3-touch
            suffix: waveshare-s3-touch
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
            .pio/libdeps
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Check airport data
        run: python3 scripts/build_large_airports.py --check

      - name: Build and merge ${{ matrix.environment }}
        run: |
          pio run -e ${{ matrix.environment }}
          pio run -t merge -e ${{ matrix.environment }}

      - name: Package release files
        run: |
          VERSION="${GITHUB_REF_NAME}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="manual-${GITHUB_SHA::7}"
          fi
          mkdir -p dist
          cp .pio/build/${{ matrix.environment }}/firmware-merged.bin "dist/plane-radar-${VERSION}-${{ matrix.suffix }}.bin"
          sha256sum "dist/plane-radar-${VERSION}-${{ matrix.suffix }}.bin" > "dist/plane-radar-${VERSION}-${{ matrix.suffix }}.bin.sha256"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.environment }}
          path: dist/*

  publish:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*

      - name: Flatten directory structure
        run: |
          mkdir -p final
          find dist -name "*.bin" -exec cp {} final/ \;
          find dist -name "*.sha256" -exec cp {} final/ \;
          ls -la final/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: final/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}