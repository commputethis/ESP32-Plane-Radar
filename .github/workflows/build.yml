name: Build

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  firmware:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [supermini, waveshare-s3]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Cache PlatformIO
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
            .pio/libdeps
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Check airport data
        run: python3 scripts/build_large_airports.py --check

      - name: Build ${{ matrix.environment }}
        run: pio run -e ${{ matrix.environment }}

      - name: Merge web-flash image
        run: pio run -t merge -e ${{ matrix.environment }}

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v5
        with:
          name: plane-radar-${{ matrix.environment }}
          if-no-files-found: error
          path: |
            .pio/build/${{ matrix.environment }}/firmware-merged.bin
            .pio/build/${{ matrix.environment }}/firmware.bin
            .pio/build/${{ matrix.environment }}/bootloader.bin
            .pio/build/${{ matrix.environment }}/partitions.bin