; Plane Radar — 1.28" round GC9A01 (240×240) on SPI
; Three build targets share the same firmware; each board has its own pinout
; (selected by the BOARD_* flag below; pins live in include/config.h):
;   env:supermini          — ESP32-C3 Super Mini ("ESP32C3 Dev Module" / "MakerGO ESP32 C3 SuperMini")
;   env:waveshare-s3-touch — Waveshare ESP32-S3-Touch-LCD-1.28 (GC9A01A + CST816S, 16MB flash, 2MB PSRAM)
;   env:waveshare-s3        — Waveshare ESP32-S3-LCD-1.28 (GC9A01A, 16MB flash, 2MB PSRAM)
; Build a specific target with:  pio run -e supermini   |   pio run -e waveshare-s3-touch   |   pio run -e waveshare-s3

[env:base]
platform = espressif32@6.5.0
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions/plane_radar.csv
extra_scripts = post:scripts/merge_firmware.py

; Anti-aliased VLW font (Noto Sans Bold 15, from TFT_eSPI smooth-font examples)
board_build.embed_files = data/ui_font.vlw

build_flags =
  -std=gnu++17
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DWM_NODEBUG
  -DWM_MDNS

lib_deps =
  lovyan03/LovyanGFX@^1.2.7
  tzapu/WiFiManager@^2.0.17
  bblanchon/ArduinoJson@^7.4.2

; ============================================================
; ESP32-C3 Super Mini + 1.28" round GC9A01 (240×240)
; Board in Arduino IDE: "ESP32C3 Dev Module" or "MakerGO ESP32 C3 SuperMini"
; ============================================================

[env:supermini]
extends = env:base
board = esp32-c3-devkitm-1

; USB serial over native (Super Mini / DevKitC-1 native USB)
build_flags =
  ${env:base.build_flags}
  -DBOARD_C3_SUPERMINI

; ============================================================
; Waveshare ESP32-S3 LCD 1.28" (non-touch, 240×240)
; ============================================================

[env:waveshare-s3]
extends = env:base
board = esp32-s3-devkitc-1
board_build.flash_size = 16MB
board_upload.flash_size = 16MB

; Anti-aliased VLW font
board_build.embed_files = data/ui_font.vlw

; ESP32-S3 UART only (no native USB by default)
build_flags =
  ${env:base.build_flags}
  -DBOARD_WAVESHARE_S3
  -DLGFX_WAVESHARE_S3

; ============================================================
; Waveshare ESP32-S3 Touch LCD 1.28" (with CST816S touch controller, 240×240)
; ============================================================
[env:waveshare-s3-touch]
extends = env:base
board = esp32-s3-devkitc-1
board_build.flash_size = 16MB
board_upload.flash_size = 16MB

; ESP32-S3 UART only (no native USB by default)
build_flags =
  ${env:base.build_flags}
  -DBOARD_S3_WAVESHARE_TOUCH128

; ============================================================
; Seeed Studio XIAO ESP32-C3
; ============================================================

[env:seeed_xiao]
extends = env:base

board = seeed_xiao_esp32c3

build_flags =
  ${env:base.build_flags}
  -DDISPLAY_TARGET_SEEED_XIAO